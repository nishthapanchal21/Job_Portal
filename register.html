<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
        }
        section {
            padding: 50px;
            background: #fff;
            margin: 20px auto;
            width: 80%;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #registration-form {
            background: #fff;
            padding: 25px;
            width: 50%;
            margin: 20px auto;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: none;
        }
        button {
            background: #0073e6;
            color: #fff;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }
        button:hover {
            background: #005bb5;
            transform: scale(1.1);
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <section id="home">
        <h2>Welcome to Job Portal</h2>
        <p>Find your dream job or hire the best talent with our easy-to-use platform.</p>
        <button onclick="toggleRegistrationForm()">Register</button>
    </section>
    <section id="registration-form">
        <h2>Register</h2>
        <form id="registration">
            <label for="role">Choose your role:</label>
            <select id="role" name="role" required>
                <option value="None">---Select your role---</option>
                <option value="job-seeker">Job Seeker</option>
                <option value="employer">Employer</option>
            </select>
            <br><br>
            <label for="name">Name:</label>
            <input type="text" id="name" required>
            <br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" required>
            <br><br>
            <button type="submit" id="Registerbtn">Register</button>
        </form>
        <button onclick="toggleRegistrationForm()">Cancel</button>
    </section>

    <script>
        function toggleRegistrationForm() {
            const form = document.getElementById("registration-form");
            form.style.display = form.style.display === "none" || form.style.display === "" ? "block" : "none";
        }
        
        document.getElementById("registration").addEventListener("submit", function(event) {
            event.preventDefault();
            const role = document.getElementById("role").value;
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            
            if (role === "None") {
                alert("Please select a role.");
                return;
            }
            
            localStorage.setItem("userRole", role);
            localStorage.setItem("userName", name);
            localStorage.setItem("userEmail", email);
            
            window.location.href = "structure.html";
        });
    </script>
</body>
</html>
