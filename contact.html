<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Job Portal</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
        }

        h1 {
            background-color: #333;
            color: white;
            padding: 15px;
            margin: 0;
        }

        .contact-info {
            background-color: white;
            padding: 20px;
            width: 50%;
            margin: 20px auto;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .contact-info ul {
            list-style: none;
            padding: 0;
        }

        .contact-info li {
            font-size: 18px;
            margin: 10px 0;
        }

        .contact-form {
            background-color: white;
            padding: 20px;
            width: 50%;
            margin: 20px auto;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            text-align: left;
        }

        .contact-form label {
            font-weight: bold;
        }

        .contact-form input, 
        .contact-form textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            transition: box-shadow 0.3s ease-in-out;
        }
        input:focus, textarea:focus {
            box-shadow: 0 0 8px #0073e6;
            outline: none;
        }

        .contact-form button {
            background-color: #0073e6;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }

        .contact-form button:hover {
            background-color: #005bb5;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <h1>Contact Us</h1>

    <div class="contact-info">
        <ul>
            <li><strong>Landline:</strong> 87625261821</li>
            <li><strong>Email:</strong> jobportal65@gmail.com</li>
            <li><strong>Office Address:</strong> APK Cross Road, Bhutnagar, Kalnandini</li>
        </ul>
    </div>

    <div class="contact-form">
        <h2>Send Us a Message</h2>
        <form id="contactForm">
            <label for="name">Your Name:</label>
            <input type="text" id="name" required>

            <label for="email">Your Email:</label>
            <input type="email" id="email" required>

            <label for="message">Your Message:</label>
            <textarea id="message" rows="5" required></textarea>

            <button type="submit">Send Message</button>
        </form>
    </div>

    <script>
        document.getElementById("contactForm").addEventListener("submit", function(event) {
            event.preventDefault(); // Prevent page reload
            
            // Collect form data
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const message = document.getElementById("message").value;

            // Simple validation
            if (!name || !email || !message) {
                alert("Please fill all fields before submitting.");
                return;
            }

            // Simulate sending a message
            alert(`Message Sent Successfully!\n\nName: ${name}\nEmail: ${email}\nMessage: ${message}`);

            // Clear form after submission
            document.getElementById("contactForm").reset();
        });
    </script>

</body>
</html>
